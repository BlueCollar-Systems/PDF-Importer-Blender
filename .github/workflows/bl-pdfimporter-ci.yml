name: bl-pdfimporter-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: bl-pdfimporter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Source-compat guard for Blender 3.0/3.1 hosts (Python 3.9).
  # Syntax-only: the vendored PyMuPDF wheel is cp310-abi3, so the full
  # dependency suite runs on >=3.10 (D5 ABI floor).
  legacy-syntax:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all Python modules (legacy floor)
        run: python -m compileall pdf_vector_importer blender_pdf_vector_importer

  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check pyproject/bl_info version consistency
        run: |
          PYPROJECT_VER=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml | head -n1)
          MAIN_VER=$(grep -oP '"version":\s*\(\K[0-9]+,\s*[0-9]+,\s*[0-9]+' pdf_vector_importer/__init__.py | head -n1 | tr -d ' ' | tr ',' '.')
          LEGACY_VER=$(grep -oP '"version":\s*\(\K[0-9]+,\s*[0-9]+,\s*[0-9]+' blender_pdf_vector_importer/__init__.py | head -n1 | tr -d ' ' | tr ',' '.')
          echo "pyproject=$PYPROJECT_VER main=$MAIN_VER legacy=$LEGACY_VER"
          if [ -z "$PYPROJECT_VER" ] || [ -z "$MAIN_VER" ] || [ -z "$LEGACY_VER" ]; then
            echo "ERROR: could not read one or more versions"
            exit 1
          fi
          if [ "$PYPROJECT_VER" != "$MAIN_VER" ] || [ "$PYPROJECT_VER" != "$LEGACY_VER" ]; then
            echo "ERROR: version mismatch (pyproject=$PYPROJECT_VER main=$MAIN_VER legacy=$LEGACY_VER)"
            exit 1
          fi

  syntax-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all Python modules
        run: python -m compileall pdf_vector_importer

      - name: Install ruff
        run: pip install ruff

      - name: Lint (functional + bugbear)
        run: ruff check --select F,B pdf_vector_importer

      - name: Install dependencies
        run: pip install "PyMuPDF>=1.24,<2.0" pytest

      - name: Verify pdfcadcore sync manifest
        run: python pdfcadcore_sync_check.py --skip-cross-repo

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Build and smoke shipped add-on ZIP
        run: |
          python build_release.py
          python scripts/smoke_release_zip.py "dist/Blender-PDF-Importer_*.zip"

      - name: Preset matrix smoke test
        run: |
          python -c "
          import sys, math
          sys.path.insert(0, '.')
          from blender_pdf_vector_importer.importer import run_import
          import fitz, tempfile, os

          # Build a mixed-content sample PDF (geometry + text + arcs + fills)
          tmp = tempfile.NamedTemporaryFile(suffix='.pdf', delete=False)
          doc = fitz.open()
          p = doc.new_page(width=612, height=792)
          p.draw_line((50,50),(300,50), color=(0,0,0), width=1)
          p.draw_circle((200,400), 30, color=(1,0,0), width=0.5)
          for i in range(8):
              a = 2*math.pi*i/8
              x, y = 400+25*math.cos(a), 300+25*math.sin(a)
              p.draw_line((400,300),(x,y), color=(0,0,1), width=0.3)
          tw = fitz.TextWriter(p.rect)
          tw.append((100,700), 'BOLT 3/4\" DIA', fontsize=12)
          tw.write_text(p)
          p2 = doc.new_page(width=612, height=792)
          p2.draw_rect((50,50,560,740), color=(0,0,0), width=0.5)
          doc.save(tmp.name)
          doc.close()

          modes = ['auto', 'vector', 'raster', 'hybrid']
          errors = []
          for mode in modes:
              try:
                  r = run_import(tmp.name, mode=mode,
                                 overrides={'pages': 'all'})
                  s = r.extraction.summary()
              except Exception as e:
                  errors.append(f'{mode}: {e}')

          os.unlink(tmp.name)
          if errors:
              for e in errors: print(f'FAIL: {e}')
              sys.exit(1)
          print(f'PASS: {len(modes)} BCS-ARCH-001 modes verified')
          "
