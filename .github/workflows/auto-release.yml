name: auto-release

on:
  push:
    branches: [main, master]
    # Docs/CI-only pushes do not mint a release (board Q-08-a / ANS-09-1).
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/**"
      - "_archived/**"
      - "dist/_archived/**"
      - "dev_logs/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to') && !contains(github.event.head_commit.message, 'automation/version-bump') && !contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run release gate tests
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install "PyMuPDF>=1.24,<2.0" pytest
          python pdfcadcore_sync_check.py --skip-cross-repo
          python -m pytest tests/ -q --basetemp "$RUNNER_TEMP/pytest-blender"

      - name: Read and bump version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          init_file = pathlib.Path("pdf_vector_importer/__init__.py")
          pyproject = pathlib.Path("pyproject.toml")
          readme = pathlib.Path("README.md")

          init_text = init_file.read_text(encoding="utf-8")
          match = re.search(r'("version":\s*\()(\d+),\s*(\d+),\s*(\d+)(\))', init_text)
          if not match:
              raise SystemExit('Could not parse version tuple from pdf_vector_importer/__init__.py')

          major, minor, patch = map(int, match.groups()[1:4])
          old_version = f"{major}.{minor}.{patch}"

          tags = set(
              t.strip()
              for t in subprocess.check_output(
                  ["git", "tag", "--list"],
                  text=True,
              ).splitlines()
              if t.strip()
          )
          next_patch = patch + 1
          while f"v{major}.{minor}.{next_patch}" in tags:
              next_patch += 1
          new_version = f"{major}.{minor}.{next_patch}"

          init_text = re.sub(
              r'("version":\s*\()(\d+),\s*(\d+),\s*(\d+)(\))',
              rf'\g<1>{major}, {minor}, {next_patch}\5',
              init_text,
              count=1,
          )
          init_file.write_text(init_text, encoding="utf-8")

          pyproject_text = pyproject.read_text(encoding="utf-8")
          pyproject_text = re.sub(
              r'(^version\s*=\s*")(\d+\.\d+\.\d+)(")',
              rf'\g<1>{new_version}\3',
              pyproject_text,
              count=1,
              flags=re.MULTILINE,
          )
          pyproject.write_text(pyproject_text, encoding="utf-8")

          legacy_init = pathlib.Path("blender_pdf_vector_importer/__init__.py")
          if legacy_init.exists():
              legacy_text = legacy_init.read_text(encoding="utf-8")
              legacy_text = re.sub(
                  r'("version":\s*\()(\d+),\s*(\d+),\s*(\d+)(\))',
                  rf'\g<1>{major}, {minor}, {next_patch}\5',
                  legacy_text,
                  count=1,
              )
              legacy_init.write_text(legacy_text, encoding="utf-8")

          readme_text = readme.read_text(encoding="utf-8")
          readme_text = re.sub(
              r"(Version-)(\d+\.\d+\.\d+)(-(green|blue)\.svg)",
              rf"\g<1>{new_version}\3",
              readme_text,
              count=1,
          )
          readme.write_text(readme_text, encoding="utf-8")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(
              f"old_version={old_version}\nversion={new_version}\n",
              encoding="utf-8",
          )
          PY

      - name: Commit and push version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pdf_vector_importer/__init__.py blender_pdf_vector_importer/__init__.py pyproject.toml README.md
          if git diff --cached --quiet; then
            echo "No version bump changes to commit."
          else
            git commit -m "chore: bump version to ${VERSION}"
            if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "::warning::Could not push version bump to '${GITHUB_REF_NAME}' (likely branch protection). Continuing to publish the release; tag-based versioning keeps releases unique."
            fi
          fi

      - name: Build release
        run: python build_release.py

      - name: Smoke shipped add-on ZIP
        run: python scripts/smoke_release_zip.py "dist/Blender-PDF-Importer_*.zip"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v${{ steps.version.outputs.version }}"
          TITLE="v${{ steps.version.outputs.version }} — PDF Vector Importer for Blender"

          git fetch --tags --force
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --clobber
          else
            gh release create "$TAG" --target "$(git rev-parse HEAD)" --title "$TITLE" --generate-notes --latest dist/*.zip
          fi

      - name: Check website dispatch token secret
        id: website_dispatch_token
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
        run: |
          if [ -n "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch website release update
        if: steps.website_dispatch_token.outputs.has_token == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const tag = 'v${{ steps.version.outputs.version }}';
            const payload = {
              source_repo: context.repo.owner + '/' + context.repo.repo,
              source_event: 'auto-release',
              source_ref: context.ref,
              source_sha: context.sha,
              release_tag: tag,
              release_name: tag,
              release_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
            };

            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner: 'BlueCollar-Systems',
              repo: 'BlueCollar-Website',
              event_type: 'product-release',
              client_payload: payload,
            });

            core.info('Dispatched product-release to BlueCollar-Website');

      - name: Warn when website dispatch token is missing
        if: steps.website_dispatch_token.outputs.has_token != 'true'
        run: |
          echo "::warning::Skipping website dispatch because no valid dispatch token secret is configured."
          echo "Set WEBSITE_DISPATCH_TOKEN (or BLUECOLLAR_WEBSITE_DISPATCH_TOKEN / REPO_DISPATCH_TOKEN) to enable cross-repo dispatch."
