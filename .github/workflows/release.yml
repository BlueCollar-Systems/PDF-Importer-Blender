name: blender-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: blender-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install release gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "PyMuPDF>=1.24,<2.0" pytest

      - name: Run release gate tests
        run: |
          python pdfcadcore_sync_check.py --skip-cross-repo
          python -m compileall pdf_vector_importer blender_pdf_vector_importer
          python -m pytest tests/ -q --basetemp "$RUNNER_TEMP/pytest-blender"

      - name: Build release zip
        run: python build_release.py

      - name: Smoke release ZIP
        run: python scripts/smoke_release_zip.py "dist/Blender-PDF-Importer_*.zip"

      - name: Upload build artifacts (workflow run)
        uses: actions/upload-artifact@v7
        with:
          name: blender-pdfimporter-release-assets
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*.zip
